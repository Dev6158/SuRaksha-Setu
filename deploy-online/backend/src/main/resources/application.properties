```properties
spring.application.name=demo
server.port=${PORT:8080}


# ===============================
# JWT Configuration
# ===============================
security.jwt.secret=suraksha-dev-secret-key-12345678901234567890

# ===============================
# PostgreSQL Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:suraksha}}
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:change_me}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Force UTC timezone
spring.datasource.hikari.data-source-properties.options=-c TimeZone=UTC

# ===============================
# Redis Configuration
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===============================
# AI Service Configuration
# ===============================
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# ===============================
# Actuator Health Endpoint
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
```
