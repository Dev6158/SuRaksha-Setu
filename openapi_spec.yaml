openapi: 3.0.0

info:
  title: SuRaksha Setu API
  version: 1.0.0
  description: Banking Fraud Detection and Risk Analysis Platform

paths:

  /api/v1/auth/register:
    post:
      summary: Register a new user

  /api/v1/auth/login:
    post:
      summary: Authenticate user and return JWT

  /api/v1/forensics/documents:
    post:
      summary: Upload document for forensic analysis

  /api/v1/analytics/risk-events:
    get:
      summary: Retrieve risk events within a time window

  /api/v1/analytics/risk-events/high-risk:
    get:
      summary: Retrieve high-risk events

  /api/v1/analytics/risk-events/trends/hourly:
    get:
      summary: Retrieve hourly risk trends