spring.application.name=demo

# ===============================
# JWT Configuration
# ===============================
security.jwt.secret=suraksha-dev-secret-key-12345678901234567890

# ===============================
# PostgreSQL Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suraksha}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Force UTC timezone
spring.datasource.hikari.data-source-properties.options=-c TimeZone=UTC

# ===============================
# Redis Configuration
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===============================
# AI / ML Services Configuration
# ===============================
# Forensic Engine URL (for document fraud detection)
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Behavioral Engine URL (for telemetry analysis)
ml.fastapi.base-url=${ML_BEHAVIORAL_URL:http://localhost:8080}
ml.fastapi.risk-path=/score

# ===============================
# Actuator Health Endpoint
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

document.storage.root=${DOCUMENT_STORAGE_ROOT:/tmp/uploads}